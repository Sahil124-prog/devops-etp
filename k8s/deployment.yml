apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: express-app
  template:
    metadata:
      labels:
        app: express-app
    spec:
      containers:
        - name: express-app-container
          image: sahilrajput062004/devops-etp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: express-app-service
spec:
  type: NodePort
  selector:
    app: express-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30002
